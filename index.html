<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dallas Lucy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #050510;
      overflow: hidden;
      font-family: 'Cinzel', serif;
    }

    #scene {
      width: 100vw; height: 100vh;
      position: relative;
    }

    #cafe-svg {
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
    }

    /* ── Interactive SVG groups ─────────────────────── */
    .interactive {
      cursor: pointer;
      transition: filter 0.25s;
    }
    .interactive:hover {
      filter: brightness(1.5) drop-shadow(0 0 10px rgba(232,180,90,0.85));
    }
    .item-label {
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      font-family: 'Cinzel', serif;
    }
    .interactive:hover .item-label { opacity: 1; }

    /* ── Title overlay ──────────────────────────────── */
    #title-overlay {
      position: absolute;
      top: 38px; left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }
    #title-overlay h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.6rem, 3.5vw, 3rem);
      color: #e8b45a;
      letter-spacing: 8px;
      text-shadow: 0 0 30px rgba(232,180,90,0.5), 0 0 70px rgba(232,180,90,0.2);
    }
    #title-overlay p {
      font-size: 0.7rem;
      color: rgba(232,180,90,0.55);
      letter-spacing: 10px;
      margin-top: 6px;
    }

    /* ── Hint text ──────────────────────────────────── */
    #hint {
      position: absolute;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      color: rgba(232,180,90,0.4);
      font-size: 0.65rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      z-index: 10;
      pointer-events: none;
    }

    /* ── Page transition overlay ────────────────────── */
    #transition-overlay {
      position: fixed;
      inset: 0;
      background: #050510;
      z-index: 100;
      pointer-events: none;
      opacity: 1;
    }

    /* ── Pendant lamp flicker ───────────────────────── */
    @keyframes flicker {
      0%,89%,91%,93%,100% { opacity: 1; }
      90%             { opacity: 0.75; }
      92%             { opacity: 0.9; }
    }
    .pendant-glow { animation: flicker 9s ease-in-out infinite; }

    /* ── Laptop cursor blink ───────────────────────── */
    @keyframes blink { 0%,100%{opacity:0.9} 50%{opacity:0} }
    .cursor-blink { animation: blink 1.1s step-end infinite; }
  </style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
// ─── BIWA SYNTHESIZER (no audio files needed) ──────────────────
// Synthesizes a plucked string chord resembling a biwa strum.
// Notes: A3 + D4 + A4 with sharp attack, long natural decay.
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBiwa() {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  // A slight reverb via convolver would be ideal but we simulate with delay
  const notes = [
    { freq: 220.00, vol: 0.28, delay: 0.000, type: 'sawtooth' }, // A3
    { freq: 293.66, vol: 0.18, delay: 0.060, type: 'triangle'  }, // D4
    { freq: 440.00, vol: 0.14, delay: 0.120, type: 'triangle'  }, // A4
  ];

  notes.forEach(({ freq, vol, delay, type }) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    const filt = ctx.createBiquadFilter();

    filt.type = 'lowpass';
    filt.frequency.value = 1800;
    filt.Q.value = 1.2;

    osc.type = type;
    // Slight pitch fall on attack (biwa characteristic)
    osc.frequency.setValueAtTime(freq * 1.018, ctx.currentTime + delay);
    osc.frequency.exponentialRampToValueAtTime(freq, ctx.currentTime + delay + 0.06);

    // Envelope: instant attack, slow exponential decay
    gain.gain.setValueAtTime(0,   ctx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0005, ctx.currentTime + delay + 2.8);

    osc.connect(filt);
    filt.connect(gain);
    gain.connect(ctx.destination);

    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + 3.0);
  });
}

// ─── NAVIGATION WITH GSAP TRANSITION ──────────────────────────
const overlay = document.getElementById('transition-overlay');

function navigateTo(url) {
  playBiwa();
  gsap.to(overlay, {
    opacity: 1,
    duration: 0.65,
    ease: 'power2.in',
    onComplete: () => { window.location.href = url; }
  });
}

// ─── ATTACH CLICK HANDLERS ─────────────────────────────────────
document.querySelectorAll('.interactive').forEach(el => {
  el.addEventListener('click', function () {
    const target = this.dataset.target;
    if (!target) return;

    // Quick scale punch on the element
    gsap.to(this, {
      scale: 1.06,
      duration: 0.12,
      ease: 'power2.out',
      yoyo: true,
      repeat: 1,
      transformOrigin: 'center center',
      onComplete: () => navigateTo(target)
    });
  });

  // Hover micro-animation
  el.addEventListener('mouseenter', () =>
    gsap.to(el, { scale: 1.03, duration: 0.2, ease: 'power2.out', transformOrigin: 'center center' }));
  el.addEventListener('mouseleave', () =>
    gsap.to(el, { scale: 1.00, duration: 0.2, ease: 'power2.out' }));
});

// ─── INTRO SEQUENCE ────────────────────────────────────────────
const title    = document.getElementById('title-overlay');
const hint     = document.getElementById('hint');
const items    = document.querySelectorAll('.interactive');

gsap.set([title, hint], { opacity: 0 });
gsap.set(items,          { opacity: 0 });

gsap.timeline({ delay: 0.1 })
  // Fade out the black overlay (reveal the scene)
  .to(overlay, { opacity: 0, duration: 1.4, ease: 'power2.out' })
  // Title drifts in
  .fromTo(title, { y: -14, opacity: 0 },
                 { y: 0,   opacity: 1, duration: 1.0, ease: 'power2.out' }, '-=0.4')
  // Interactive objects appear with a stagger
  .to(items, { opacity: 1, duration: 0.7, stagger: 0.12, ease: 'power2.out' }, '-=0.3')
  // Hint text last
  .to(hint, { opacity: 1, duration: 0.8, ease: 'power2.out' }, '-=0.1');
</script>
